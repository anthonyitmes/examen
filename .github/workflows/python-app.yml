name: FastAPI CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # NUEVO: Levantamos un servicio de PostgreSQL temporal
    services:
      postgres:
        image: postgres:15  # Usa la versión que tengas en local
        env:
          POSTGRES_USER: tu_usuario_aqui
          POSTGRES_PASSWORD: tu_password_aqui
          POSTGRES_DB: tu_base_de_datos_aqui
        ports:
          - 5432:5432
        # Esto asegura que la DB esté lista antes de seguir
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Descargar el repositorio
      uses: actions/checkout@v4

    - name: Configurar Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest httpx

    - name: Ejecutar pruebas con Pytest
      run: |
        pytest